url: https://waeponwifestre.djnavarro.net/

template:
  bootstrap: 5
  light-switch: true
  bslib:
    base_font: {google: "Atkinson Hyperlegible"}
    heading_font: {google: "Atkinson Hyperlegible"}
    bg: "#eee"  # Background color for light mode
    fg: "#152740"  # Text color for light mode
    primary: "#306cc9"  # Link color for light mode
    navbar-light-bg: "#ddd" # Navbar background for light mode
    bg-dark: "#222"  # Background color for dark mode
    body-bg-dark: "#222"
    fg-dark: "#ccc"  # Text color for dark mode
    primary-dark: "#cd3782"  # Link color for dark mode    
    link-color-dark: "#cd3782"
    navbar-dark-bg: "#cd3782" # Navbar background for dark mode
  theme: arrow-light
  theme-dark: a11y-dark

navbar:
  structure:
    left:  [intro, reference, articles, tutorials, news]
    right: [search, github, packages, sites, lightswitch]
  components:
    packages:
      icon: fa-code
      href: https://code.djnavarro.net
      aria-label: Code projects
    sites:
      icon: fa-link
      aria-label: Links
      menu:
      - text: Homepage
        href: https://djnavarro.net
      - text: Data science blog
        href: https://blog.djnavarro.net
      - text: Computational art
        href: https://art.djnavarro.net
      - text: Coding projects
        href: https://code.djnavarro.net
      - text: Academic papers
        href: https://papers.djnavarro.net
      - text: More...
        href: https://djnavarro.net/sites/

footer:
  structure: 
    left: by_danielle
    right: built_with
  components:
    by_danielle: Developed by [Danielle Navarro](https://djnavarro.net) 
  

